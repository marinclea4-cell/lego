<!DOCTYPE html>
<html>
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <title>🧱 Lego | Predictability of a lego set deal</title>
  </head>
  <body>
    <h1>Lego</h1>
    <section id="options">
      <div id="show">
        <label for="show-select">Show:</label>
        <select name="show" id="show-select">
          <option value="6">6</option>
          <option value="12">12</option>
          <option value="24">24</option>
        </select>
      </div>
      <div id="page">
        <label for="page-select">Go to page:</label>
        <select name="page" id="page-select"> </select>
      </div>
      <div id="filters">
        <button type="button" id="filter-best-discount">By best discount</button>
        <button type="button" id="filter-most-commented">By most commented</button>
        <button type="button" id="filter-hot-deals">By hot deals</button>
        <button type="button" id="filter-favorites">Show Favorites ❤️</button>
      </div>
      <div id="sort">
        <label for="sort-select">Sort:</label>
        <select name="sort" id="sort-select">
          <option value="price-asc">Cheaper</option>
          <option value="price-desc">Expensive</option>
          <option value="date-asc">Recently published</option>
          <option value="date-desc">Anciently published</option>
        </select>
      </div>
    </section>
    <section id="lego">
      <h2>Lego sets</h2>
      <div>
        <label>Lego set id:</label>
        <select id="lego-set-id-select"></select> 
      </div>
    </section>
    <section id="indicators">
      <h2>Indicators</h2>
      <div>
    <span>Number of deals</span>
    <span id="nbDeals">0</span>
      </div>
      <div>
    <span>Number of sales</span>
    <span id="nbSales">0</span>
      </div>
      <div>
        <span>p5 sales price value</span>
        <span id="p5Value">0</span> </div>
      <div>
        <span>p25 sales price value</span>
        <span id="p25Value">0</span> </div>
      <div>
        <span>p50 sales price value</span>
        <span id="p50Value">0</span> </div>
      <div>
        <span>Lifetime value</span>
        <span id="lifetimeValue">0 days</span> </div>
    </section>
    <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 20px; background: #f4f7f6; }
  
    /* Grille des deals */
    #deals { 
      display: grid; 
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); 
      gap: 20px; 
      margin-top: 20px; 
    }

    /* Style d'une carte Deal */
    .deal { 
      background: white; 
      padding: 15px; 
      border-radius: 8px; 
      box-shadow: 0 2px 5px rgba(0,0,0,0.1); 
      display: flex; 
      flex-direction: column;
      transition: transform 0.2s;
    }
  
  .deal:hover { transform: translateY(-5px); }

  .deal a { 
    font-weight: bold; 
    color: #333; 
    text-decoration: none; 
    margin: 10px 0; 
    height: 40px; 
    overflow: hidden;
  }

  .deal strong { color: #e43f5a; font-size: 1.2em; }

  /* Bouton Favoris */
  .fav-btn { 
    background: none; 
    border: 1px solid #ddd; 
    cursor: pointer; 
    font-size: 1.2em; 
    border-radius: 50%; 
    width: 40px; 
    height: 40px; 
    align-self: flex-end;
  }

  /* Header & Options */
  #options, #indicators, #lego { 
    background: white; 
    padding: 15px; 
    border-radius: 8px; 
    margin-bottom: 20px; 
  }
  
  button, select { padding: 8px; border-radius: 4px; border: 1px solid #ccc; cursor: pointer; }
  button:hover { background: #eee; }
</style>
    <section id="deals"></section>
    <script type="text/javascript" charset="UTF-8" src="utils.js"></script>
    <script type="text/javascript" charset="UTF-8" src="portfolio.js"></script>
  </body>
</html>
